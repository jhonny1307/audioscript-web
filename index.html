<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Script</title>

<style>
body {
    font-family: Arial;
    background:#111;
    color:#eee;
    padding:15px;
    max-width:900px;
    margin:auto;
}

textarea, input {
    width:100%;
    margin-bottom:10px;
    font-size:16px;
}

button {
    margin:5px 5px 5px 0;
    padding:8px 12px;
    font-size:14px;
}

.part {
    border:1px solid #444;
    padding:10px;
    margin:15px 0;
    border-radius:6px;
}

.controls {
    margin-top:10px;
    display:flex;
    flex-wrap:wrap;
    gap:5px;
}

audio {
    width:100%;
    margin-top:10px;
}

.comment {
    border:1px dashed #666;
    padding:10px;
    margin:10px 0;
    color:#aaa;
    font-style:italic;
}

.topbar {
    margin-bottom:15px;
}

/* 📱 MOBILE */
@media (max-width:600px){
    body { padding:10px; }
    button {
        flex:1 1 100%;
        font-size:16px;
        padding:10px;
    }
    .controls {
        flex-direction:column;
    }
}
</style>
</head>
<body>

<h2>Audio Script</h2>

<textarea id="script" rows="6" placeholder="Paste your script here..."></textarea>

<div class="topbar">
    <button onclick="splitScript()">Split</button>
    <button onclick="clearProject()">Clear</button>
</div>

<h3>Gap between tracks (ms)</h3>
<input type="number" id="gap" value="0">

<div id="parts"></div>

<button onclick="generateAudio(false)">Generate final audio</button>
<button onclick="generateAudio(true)">Generate final audio (with all)</button>

<hr style="border:0; border-top:1px solid #333; margin-top:40px;">

<footer style="margin-top:20px; font-size:14px; color:#888; text-align:center;">
    made with AI (chatGPT),
    <a href="https://github.com/jhonny1307/audioscript-web" target="_blank" style="color:#aaa;">
        project file (v9.1)
    </a>
</footer>

<script>
let parts = [];
let chunks = {};
let toggles = {};
let mediaRecorder;
let currentStream;
let state = {};
let tempData = {};

function autoSave(){
    const roteiro = document.getElementById("script").value;

    let audios = {};
    Promise.all(Object.keys(chunks).map(async i => {
        audios[i] = await blobToBase64(chunks[i]);
    })).then(()=>{
        const data = { roteiro, audios, toggles };
        localStorage.setItem("audioRoteiro", JSON.stringify(data));
    });
}

function toggleLike(i){
    toggles[i] = toggles[i] ? 0 : 1;
    document.getElementById(`like_${i}`).innerText = toggles[i] ? "🔴" : "⚫";
    autoSave();
}

function splitScript() {
    const text = document.getElementById("script").value;
    parts = text.split("\n").filter(p => p.trim() !== "");
    const container = document.getElementById("parts");
    container.innerHTML = "";
    chunks = {};
    state = {};

    parts.forEach((p, i) => {
        const trimmed = p.trim();

        if(trimmed.startsWith("//")){
            const div = document.createElement("div");
            div.className = "comment";
            div.innerText = trimmed.replace("//", "").trim();
            container.appendChild(div);
            return;
        }

        if(toggles[i] === undefined) toggles[i] = 0;
        state[i] = "idle";

        const div = document.createElement("div");
        div.className = "part";
        div.innerHTML = `
            <p>${p}</p>

            <audio controls id="audio_${i}"></audio>

            <div class="controls">
                <button id="like_${i}" onclick="toggleLike(${i})">${toggles[i] ? "🔴" : "⚫"}</button>
                <button id="btn_${i}" onclick="toggleRecording(${i})">Record</button>
                <button id="interrupt_${i}" onclick="interruptRecording(${i})" style="display:none;">Interrupt</button>
                <button id="upload_${i}" onclick="uploadAudio(${i})">Upload</button>
                <input type="file" id="file_${i}" accept="audio/*" style="display:none;">
            </div>
        `;
        container.appendChild(div);

        document.getElementById(`file_${i}`).addEventListener("change", (e)=>{
            const file = e.target.files[0];
            if(!file) return;

            const blob = new Blob([file], { type:file.type });
            chunks[i] = blob;
            document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);

            state[i] = "recorded";
            document.getElementById(`btn_${i}`).innerText = "Re-record";

            autoSave();
        });
    });

    autoSave();
}

function uploadAudio(i){
    document.getElementById(`file_${i}`).click();
}

async function toggleRecording(i){
    const btn = document.getElementById(`btn_${i}`);
    const interruptBtn = document.getElementById(`interrupt_${i}`);
    const uploadBtn = document.getElementById(`upload_${i}`);

    if(state[i] === "idle" || state[i] === "recorded"){
        currentStream = await navigator.mediaDevices.getUserMedia({ audio:true });
        mediaRecorder = new MediaRecorder(currentStream);

        tempData[i] = [];

        mediaRecorder.ondataavailable = e => tempData[i].push(e.data);

        mediaRecorder.onstop = () => {
            if(tempData[i].length){
                const blob = new Blob(tempData[i], { type:"audio/webm" });
                chunks[i] = blob;
                document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
            }

            currentStream.getTracks().forEach(t => t.stop());

            state[i] = "recorded";
            btn.innerText = "Re-record";
            interruptBtn.style.display = "none";
            uploadBtn.style.display = "inline-block";

            autoSave();
        };

        mediaRecorder.start();
        state[i] = "recording";
        btn.innerText = "Stop";
        interruptBtn.style.display = "inline-block";
        uploadBtn.style.display = "none";
    }
    else if(state[i] === "recording"){
        mediaRecorder.stop();
        btn.innerText = "Processing...";
        interruptBtn.style.display = "none";
    }
}

function interruptRecording(i){
    if(mediaRecorder && state[i] === "recording"){
        mediaRecorder.onstop = null;
        mediaRecorder.stop();

        if(currentStream){
            currentStream.getTracks().forEach(t => t.stop());
        }

        tempData[i] = [];

        const btn = document.getElementById(`btn_${i}`);
        const interruptBtn = document.getElementById(`interrupt_${i}`);
        const uploadBtn = document.getElementById(`upload_${i}`);

        state[i] = chunks[i] ? "recorded" : "idle";
        btn.innerText = chunks[i] ? "Re-record" : "Record";
        interruptBtn.style.display = "none";
        uploadBtn.style.display = "inline-block";
    }
}

function clearProject(){
    localStorage.removeItem("audioRoteiro");
    location.reload();
}

window.onload = function(){
    const data = JSON.parse(localStorage.getItem("audioRoteiro"));
    if(!data) return;

    document.getElementById("script").value = data.roteiro;
    toggles = data.toggles || {};

    splitScript();

    for (let i in data.audios){
        const blob = base64ToBlob(data.audios[i]);
        chunks[i] = blob;
        document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
        state[i] = "recorded";
        document.getElementById(`btn_${i}`).innerText = "Re-record";
    }
};

async function generateAudio(useAll){
    const gap = parseInt(document.getElementById("gap").value) || 0;
    const ctx = new AudioContext();
    let buffers = [];

    for(let i=0;i<parts.length;i++){
        if(!chunks[i]) continue;
        if(!useAll && !toggles[i]) continue;

        try {
            const buffer = await ctx.decodeAudioData(await chunks[i].arrayBuffer());
            buffers.push(buffer);
        } catch(e){}
    }

    if(!buffers.length){
        alert("No audio selected");
        return;
    }

    let totalLength = buffers.reduce((a,b)=>a+b.length,0) + (gap/1000 * ctx.sampleRate * buffers.length);
    let output = ctx.createBuffer(1, totalLength, ctx.sampleRate);

    let offset = 0;
    buffers.forEach(b=>{
        output.getChannelData(0).set(b.getChannelData(0), offset);
        offset += b.length + (gap/1000 * ctx.sampleRate);
    });

    const wav = bufferToWav(output);
    const blob = new Blob([wav], { type:"audio/wav" });

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "final.wav";
    a.click();
    URL.revokeObjectURL(url);
}

function bufferToWav(buffer) {
    let length = buffer.length * 2 + 44;
    let arrayBuffer = new ArrayBuffer(length);
    let view = new DataView(arrayBuffer);

    function writeString(v,o,s){ for(let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i)); }

    writeString(view,0,"RIFF");
    view.setUint32(4,36 + buffer.length*2,true);
    writeString(view,8,"WAVE");
    writeString(view,12,"fmt ");
    view.setUint32(16,16,true);
    view.setUint16(20,1,true);
    view.setUint16(22,1,true);
    view.setUint32(24,buffer.sampleRate,true);
    view.setUint32(28,buffer.sampleRate*2,true);
    view.setUint16(32,2,true);
    view.setUint16(34,16,true);
    writeString(view,36,"data");
    view.setUint32(40,buffer.length*2,true);

    let offset = 44;
    let data = buffer.getChannelData(0);

    for(let i=0;i<data.length;i++,offset+=2){
        let s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, s<0 ? s*0x8000 : s*0x7FFF, true);
    }

    return arrayBuffer;
}

function blobToBase64(blob){
    return new Promise(resolve=>{
        const r = new FileReader();
        r.onloadend = ()=>resolve(r.result);
        r.readAsDataURL(blob);
    });
}

function base64ToBlob(base64){
    const arr = base64.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8 = new Uint8Array(n);
    while(n--) u8[n] = bstr.charCodeAt(n);
    return new Blob([u8], {type:mime});
}
</script>

</body>
</html>
