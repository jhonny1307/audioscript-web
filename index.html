<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Audio Script</title>
<style>
body { font-family: Arial; background:#111; color:#eee; padding:20px; }
textarea, input { width:100%; margin-bottom:10px; }
button { margin:5px 5px 5px 0; }
.part { border:1px solid #444; padding:10px; margin:10px 0; }
.comment { border:1px dashed #666; padding:10px; margin:10px 0; color:#aaa; font-style:italic; }
.topbar { margin-bottom:15px; }
</style>
</head>
<body>

<h2>Audio Script</h2>
<textarea id="script" rows="6" placeholder="Paste your script here..."></textarea>

<div class="topbar">
    <button onclick="splitScript()">Split</button>
    <button onclick="clearProject()">Clear</button>
</div>

<h3>Gap between tracks (ms)</h3>
<input type="number" id="gap" value="0">

<div id="parts"></div>

<button onclick="generateAudio()">Generate final audio</button>
<a id="download" style="display:none">Download</a>

<hr style="border:0; border-top:1px solid #333; margin-top:40px;">

<footer style="margin-top:20px; font-size:14px; color:#888; text-align:center;">
    made with AI (chatGPT),
    <a href="https://github.com/jhonny1307/audioscript-web" target="_blank" style="color:#aaa;">
        project file (v6)
    </a>
</footer>

<script>
let parts = [];
let chunks = {};
let mediaRecorder;
let currentStream;
let state = {}; 

function autoSave(){
    const roteiro = document.getElementById("script").value;

    let audios = {};
    for (let i in chunks){
        audios[i] = chunks[i]; // já é blob, salvamos depois
    }

    // converter blobs pra base64
    Promise.all(Object.keys(audios).map(async i => {
        audios[i] = await blobToBase64(audios[i]);
    })).then(()=>{
        const data = { roteiro, audios };
        localStorage.setItem("audioRoteiro", JSON.stringify(data));
    });
}

function splitScript() {
    const text = document.getElementById("script").value;
    parts = text.split("\n").filter(p => p.trim() !== "");
    const container = document.getElementById("parts");
    container.innerHTML = "";
    chunks = {};
    state = {};

    parts.forEach((p, i) => {
        const trimmed = p.trim();

        if(trimmed.startsWith("//")){
            const div = document.createElement("div");
            div.className = "comment";
            div.innerText = trimmed.replace("//", "").trim();
            container.appendChild(div);
            return;
        }

        state[i] = "idle";

        const div = document.createElement("div");
        div.className = "part";
        div.innerHTML = `
            <p>${p}</p>
            <button id="btn_${i}" onclick="toggleRecording(${i})">Record</button>
            <audio controls id="audio_${i}"></audio>
        `;
        container.appendChild(div);
    });

    autoSave(); // salvar ao dividir
}

async function toggleRecording(i){
    const btn = document.getElementById(`btn_${i}`);

    if(state[i] === "idle" || state[i] === "recorded"){
        currentStream = await navigator.mediaDevices.getUserMedia({ audio:true });
        mediaRecorder = new MediaRecorder(currentStream);

        let data = [];

        mediaRecorder.ondataavailable = e => data.push(e.data);

        mediaRecorder.onstop = () => {
            const blob = new Blob(data, { type:"audio/webm" });
            chunks[i] = blob;
            document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
            currentStream.getTracks().forEach(t => t.stop());

            state[i] = "recorded";
            btn.innerText = "Re-record";

            autoSave(); // salvar ao parar
        };

        mediaRecorder.start();
        state[i] = "recording";
        btn.innerText = "Stop";
    }
    else if(state[i] === "recording"){
        mediaRecorder.stop();
        btn.innerText = "Processing...";
    }
}

function clearProject(){
    localStorage.removeItem("audioRoteiro");
    location.reload();
}

window.onload = function(){
    const data = JSON.parse(localStorage.getItem("audioRoteiro"));
    if(!data) return;

    document.getElementById("script").value = data.roteiro;

    splitScript();

    chunks = {};

    for (let i in data.audios){
        const blob = base64ToBlob(data.audios[i]);
        chunks[i] = blob;
        if(document.getElementById(`audio_${i}`)){
            document.getElementById(`audio_${i}`).src = URL.createObjectURL(blob);
            state[i] = "recorded";
            document.getElementById(`btn_${i}`).innerText = "Re-record";
        }
    }
};

async function generateAudio(){
    const gap = parseInt(document.getElementById("gap").value) || 0;
    const ctx = new AudioContext();
    let buffers = [];

    for(let i=0;i<parts.length;i++){
        if(!chunks[i]) continue;

        try {
            const arrayBuffer = await chunks[i].arrayBuffer();
            const audioBuffer = await ctx.decodeAudioData(arrayBuffer);
            buffers.push(audioBuffer);
        } catch(e){
            console.error("Decode error:", e);
        }
    }

    if(buffers.length === 0){
        alert("No audio recorded");
        return;
    }

    let totalLength = buffers.reduce((acc,b)=>acc+b.length,0) + (gap/1000 * ctx.sampleRate * buffers.length);
    let output = ctx.createBuffer(1, totalLength, ctx.sampleRate);

    let offset = 0;

    buffers.forEach(b => {
        output.getChannelData(0).set(b.getChannelData(0), offset);
        offset += b.length + (gap/1000 * ctx.sampleRate);
    });

    const wav = bufferToWav(output);
    const blob = new Blob([wav], { type:"audio/wav" });

    const link = document.getElementById("download");
    link.href = URL.createObjectURL(blob);
    link.download = "final.wav";
    link.style.display = "block";
    link.innerText = "Download audio";
}

function bufferToWav(buffer) {
    let length = buffer.length * 2 + 44;
    let arrayBuffer = new ArrayBuffer(length);
    let view = new DataView(arrayBuffer);

    function writeString(v, o, s){
        for (let i=0;i<s.length;i++) v.setUint8(o+i,s.charCodeAt(i));
    }

    writeString(view,0,"RIFF");
    view.setUint32(4,36 + buffer.length*2,true);
    writeString(view,8,"WAVE");
    writeString(view,12,"fmt ");
    view.setUint32(16,16,true);
    view.setUint16(20,1,true);
    view.setUint16(22,1,true);
    view.setUint32(24,buffer.sampleRate,true);
    view.setUint32(28,buffer.sampleRate*2,true);
    view.setUint16(32,2,true);
    view.setUint16(34,16,true);
    writeString(view,36,"data");
    view.setUint32(40,buffer.length*2,true);

    let offset = 44;
    let data = buffer.getChannelData(0);

    for(let i=0;i<data.length;i++,offset+=2){
        let s = Math.max(-1, Math.min(1, data[i]));
        view.setInt16(offset, s<0 ? s*0x8000 : s*0x7FFF, true);
    }

    return arrayBuffer;
}

function blobToBase64(blob){
    return new Promise((resolve)=>{
        const reader = new FileReader();
        reader.onloadend = ()=> resolve(reader.result);
        reader.readAsDataURL(blob);
    });
}

function base64ToBlob(base64){
    const arr = base64.split(',');
    const mime = arr[0].match(/:(.*?);/)[1];
    const bstr = atob(arr[1]);
    let n = bstr.length;
    const u8arr = new Uint8Array(n);
    while(n--){
        u8arr[n] = bstr.charCodeAt(n);
    }
    return new Blob([u8arr], {type:mime});
}
</script>

</body>
</html>
